<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for-you</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%);
        color: #f8fafc;
        min-height: 100vh;
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 4rem 1.5rem;
      }

      .hero {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 2.5rem;
        border-radius: 24px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin-top: 0;
        font-size: 2.4rem;
        margin-bottom: 1rem;
      }

      p {
        line-height: 1.7;
        font-size: 1.05rem;
        color: #e2e8f0;
      }

      .pill {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.7rem 1rem;
        background: #f8fafc;
        color: #1d4ed8;
        border-radius: 999px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Welcome to your GitHub Pages site</h1>
        <p>This polished landing page is now being served from your repository and is ready for your next update.</p>
        <div class="pill">Hosted with GitHub Pages</div>
      </section>
    </main>
  </body>
</html>
