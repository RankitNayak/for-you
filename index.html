<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Personality Scan</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d1117;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.card{
    background:#161b22;
    padding:25px;
    border-radius:15px;
    width:320px;
    box-shadow:0 0 20px #00ff99;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    cursor:pointer;
}

.bar{
    width:100%;
    height:18px;
    background:#333;
    border-radius:10px;
    margin-top:20px;
    overflow:hidden;
    display:none;
}

.fill{
    height:100%;
    width:0%;
    background:#00ff99;
    transition:width 3s linear;
}

.result{
    display:none;
    font-size:18px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="card">

<h2 id="title">🤖 AI Personality Scanner</h2>

<p id="text">
This AI can analyze your personality with 99.98% accuracy.
</p>

<div class="bar" id="bar">
<div class="fill" id="fill"></div>
</div>

<div class="result" id="result">
<h2>🎉 Scan Complete</h2>

<p>
Curiosity : ⭐⭐⭐⭐⭐<br>
Patience : ⭐⭐⭐⭐☆<br>
Smile : ❌ Not Detected
</p>

<h3>😂 RESULT 😂</h3>

<p>
You clicked every button just to know the result! 🤣
<br><br>
😊 Now smile... Mission Successful.
</p>
</div>

<button onclick="next()" id="btn">Start Scan</button>

</div>

<script>

let step=0;

function next(){

    step++;

    if(step==1){
        document.getElementById("text").innerHTML="📡 Connecting to AI Server...";
    }

    if(step==2){
        document.getElementById("text").innerHTML="🧠 Reading Curiosity Level...";
        document.getElementById("bar").style.display="block";

        setTimeout(()=>{
            document.getElementById("fill").style.width="100%";
        },100);

    }

    if(step==3){

        document.getElementById("text").innerHTML="Calculating Final Result...";

        setTimeout(()=>{

            document.getElementById("title").style.display="none";
            document.getElementById("text").style.display="none";
            document.getElementById("bar").style.display="none";
            document.getElementById("btn").style.display="none";
            document.getElementById("result").style.display="block";

        },3000);

    }

}

</script>

</body>
</html>
