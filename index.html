<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>for-you</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #f4f7ff 0%, #eef4ff 100%);
        color: #1f2937;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 4rem 1.5rem;
      }

      .card {
        background: white;
        padding: 2rem;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 2rem;
      }

      p {
        line-height: 1.6;
        color: #4b5563;
      }

      a {
        color: #2563eb;
        font-weight: 600;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Welcome to your GitHub Pages site</h1>
        <p>This page is now live from the repository root and ready to be published through GitHub Pages.</p>
        <p>You can update this content anytime by editing <strong>index.html</strong> and pushing the changes.</p>
      </section>
    </main>
  </body>
</html>
