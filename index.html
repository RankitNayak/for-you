<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For My Girl</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", Arial, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: linear-gradient(135deg, #ff5e7a 0%, #ff8e53 45%, #ffd166 100%);
        color: #fff;
      }

      .card {
        width: min(100%, 760px);
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(14px);
        border-radius: 24px;
        padding: 2rem;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      .heart {
        font-size: 3rem;
        margin-bottom: 0.5rem;
        animation: pulse 1.2s infinite;
      }

      h1 {
        margin: 0 0 0.7rem;
        font-size: clamp(2rem, 4vw, 2.8rem);
      }

      p {
        margin: 0 auto 1rem;
        line-height: 1.7;
        font-size: 1.05rem;
        max-width: 620px;
      }

      .button {
        border: none;
        border-radius: 999px;
        padding: 0.85rem 1.2rem;
        background: #fff;
        color: #ff4d6d;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
        margin-top: 0.5rem;
      }

      .message {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.18);
        display: none;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="heart">💖</div>
      <h1>For my favorite girl</h1>
      <p>You make my world brighter, sweeter, and a whole lot more fun. I just wanted to make you a little page that says: you are loved, admired, and so special to me.</p>
      <button class="button" id="revealBtn">Tap for a surprise</button>
      <div class="message" id="messageBox">
        <strong>You are my favorite person, my smile, and my happy place. ❤️</strong>
      </div>
    </main>

    <script>
      const revealBtn = document.getElementById('revealBtn');
      const messageBox = document.getElementById('messageBox');

      revealBtn.addEventListener('click', () => {
        messageBox.style.display = 'block';
        revealBtn.textContent = 'You already know it';
      });
    </script>
  </body>
</html>
