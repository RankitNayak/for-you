<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Personality Scan</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0d1117,#1f2937,#0d1117);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    overflow:hidden;
}

.card{
    background:#161b22;
    padding:25px;
    border-radius:18px;
    width:min(90%, 360px);
    box-shadow:0 0 25px #00ff99;
    position:relative;
}

.sparkle{
    position:absolute;
    width:8px;
    height:8px;
    background:#00ff99;
    border-radius:50%;
    animation: float 2s infinite ease-in-out;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#00c853,#00e676);
    color:white;
    cursor:pointer;
    transition:transform 0.2s ease;
}

button:hover{
    transform:scale(1.05);
}

.bar{
    width:100%;
    height:18px;
    background:#333;
    border-radius:10px;
    margin-top:20px;
    overflow:hidden;
    display:none;
}

.fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ff99,#00c853);
    transition:width 3s linear;
}

.result{
    display:none;
    font-size:18px;
    line-height:1.6;
}

.fake-btns{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:12px;
    flex-wrap:wrap;
}

.fake-btns button{
    margin-top:0;
    padding:8px 12px;
    font-size:13px;
    background:#21262d;
    color:#fff;
}

@keyframes float{
    0%,100%{transform:translateY(0);opacity:0.4;}
    50%{transform:translateY(-12px);opacity:1;}
}
</style>
</head>

<body>

<div class="card">
<div class="sparkle" style="top:10px; left:20px; animation-delay:0s;"></div>
<div class="sparkle" style="top:20px; right:25px; animation-delay:0.6s;"></div>
<div class="sparkle" style="bottom:20px; left:30px; animation-delay:1.1s;"></div>

<h2 id="title">🤖 AI Personality Scanner</h2>

<p id="text">
This AI can analyze your personality with 99.98% accuracy.
</p>

<div class="bar" id="bar">
<div class="fill" id="fill"></div>
</div>

<div class="result" id="result">
<h2>🎉 Scan Complete</h2>

<p>
Curiosity : ⭐⭐⭐⭐⭐<br>
Patience : ⭐⭐⭐⭐☆<br>
Smile : ❌ Not Detected
</p>

<h3>😂 RESULT 😂</h3>

<p>
You clicked every button just to know the result! 🤣
<br><br>
😊 Now smile... Mission Successful.
</p>
</div>

<div class="fake-btns">
<button onclick="next()" id="btn">Start Scan</button>
<button onclick="surprise()">Try Surprise</button>
</div>

</div>

<script>

let step=0;

function next(){

    step++;

    if(step==1){
        document.getElementById("text").innerHTML="📡 Connecting to AI Server...";
    }

    if(step==2){
        document.getElementById("text").innerHTML="🧠 Reading Curiosity Level...";
        document.getElementById("bar").style.display="block";

        setTimeout(()=>{
            document.getElementById("fill").style.width="100%";
        },100);

    }

    if(step==3){

        document.getElementById("text").innerHTML="Calculating Final Result...";

        setTimeout(()=>{

            document.getElementById("title").style.display="none";
            document.getElementById("text").style.display="none";
            document.getElementById("bar").style.display="none";
            document.getElementById("btn").style.display="none";
            document.getElementById("result").style.display="block";

        },3000);

    }

}

function surprise(){
    document.getElementById("text").innerHTML="😏 The AI says: You are secretly a chaos goblin... but lovable.";
    document.getElementById("bar").style.display="block";
    document.getElementById("fill").style.width="100%";
    setTimeout(()=>{
        document.getElementById("text").innerHTML="✨ Bonus: You have 100% charm and 0% chill.";
    },1800);
}

</script>

</body>
</html>
