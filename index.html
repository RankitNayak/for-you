<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelluuuuuuu Personality Test</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ff4d6d,#7b2cbf,#00b4d8,#00f5d4);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    overflow:auto;
    position:relative;
    padding:20px;
    box-sizing:border-box;
}

.card{
    background:rgba(22,27,34,0.95);
    padding:25px;
    border-radius:22px;
    width:min(90%, 430px);
    box-shadow:0 0 35px rgba(255,255,255,0.25);
    position:relative;
    border:2px solid rgba(255,255,255,0.15);
    animation: popIn 0.6s ease;
}

.sparkle{
    position:absolute;
    width:10px;
    height:10px;
    background:#ffd166;
    border-radius:50%;
    animation: float 1.8s infinite ease-in-out;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:999px;
    background:linear-gradient(135deg,#ff5f7d,#ff8a5b);
    color:white;
    cursor:pointer;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow:0 5px 15px rgba(255,95,125,0.35);
}

button:hover{
    transform:scale(1.06);
}

.bar{
    width:100%;
    height:18px;
    background:#444;
    border-radius:10px;
    margin-top:20px;
    overflow:hidden;
    display:none;
}

.fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ff99,#ffd166);
    transition:width 3s linear;
}

.result{
    display:none;
    font-size:18px;
    line-height:1.6;
}

.result-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin:6px 0;
    font-size:15px;
}

.fake-btns{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:12px;
    flex-wrap:wrap;
}

.fake-btns button{
    margin-top:0;
    padding:8px 12px;
    font-size:13px;
    background:#2d3748;
    color:#fff;
    box-shadow:none;
}

.emoji{font-size:1.3rem; animation:bounce 1s infinite; display:inline-block;}

.blink{animation: blink 0.8s infinite;}

.options{display:grid; gap:10px; margin-top:16px;}

.option-btn{
    width:100%;
    margin-top:0;
    padding:11px 14px;
    font-size:14px;
    border-radius:14px;
    background:linear-gradient(135deg,#ff6f91,#ff9f1c);
    box-shadow:0 4px 12px rgba(255,111,145,0.25);
}

.option-btn:hover{transform:translateY(-2px);}

.hidden{display:none;}

.small{font-size:13px; color:#ffd6e8; margin-top:10px;}

.result-box{margin-top:14px; padding:12px; border-radius:14px; background:rgba(255,255,255,0.08); text-align:left;}

@keyframes float{
    0%,100%{transform:translateY(0) scale(1);opacity:0.4;}
    50%{transform:translateY(-12px) scale(1.2);opacity:1;}
}

@keyframes bounce{
    0%,100%{transform:translateY(0);} 
    50%{transform:translateY(-6px);} 
}

@keyframes popIn{
    from{transform:scale(0.95);opacity:0.6;}
    to{transform:scale(1);opacity:1;}
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0.3;}
}
</style>
</head>

<body>

<div class="card">
<div class="sparkle" style="top:10px; left:20px; animation-delay:0s;"></div>
<div class="sparkle" style="top:20px; right:25px; animation-delay:0.6s;"></div>
<div class="sparkle" style="bottom:20px; left:30px; animation-delay:1.1s;"></div>

<h2 id="title">💖 Gelluuuuuuu Love Mood Test <span class="emoji">✨</span></h2>

<div id="intro">
<p id="text" class="blink">
A tiny little quiz for your heart 💕<br>
I will ask her a few sweet questions about you, her mood, and what she feels about you. Then I will define the result with extra cuteness. 🌸💫
</p>
<button onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quiz" class="hidden">
<p id="progress" class="small">Question 1 of 3</p>
<h3 id="questionText">Question will appear here</h3>
<div id="options" class="options"></div>
</div>

<div id="result" class="hidden">
<h3>💘 Result Revealed</h3>
<div id="resultText" class="result-box"></div>
<div id="answersSummary" class="result-box"></div>
<button onclick="startQuiz()" style="margin-top:16px;">Try Again</button>
</div>

</div>

<script>

const questions = [
  {
    prompt: "What do you think about me?",
    options: [
      "💗 You are sweet and caring",
      "😄 You are funny and chaotic",
      "🌙 You are dreamy and mysterious",
      "✨ You are extra adorable"
    ]
  },
  {
    prompt: "How is her mood right now?",
    options: [
      "🌸 Happy and glowing",
      "💞 A little shy but soft",
      "🎭 Playful and teasing",
      "🫶 Thinking about you a lot"
    ]
  },
  {
    prompt: "What does she feel about you?",
    options: [
      "💘 She smiles because of you",
      "🫰 She feels safe with you",
      "💌 She thinks about you often",
      "🌈 She wants to be close to you"
    ]
  }
];

let currentStep = 0;
let answers = [];

function startQuiz(){
  currentStep = 0;
  answers = [];
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion(){
  const q = questions[currentStep];
  document.getElementById("questionText").textContent = q.prompt;
  document.getElementById("progress").textContent = `Question ${currentStep + 1} of ${questions.length}`;

  const optionsBox = document.getElementById("options");
  optionsBox.innerHTML = "";

  q.options.forEach((option) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = option;
    btn.onclick = () => selectAnswer(option);
    optionsBox.appendChild(btn);
  });
}

function selectAnswer(option){
  answers.push(option);

  if(currentStep < questions.length - 1){
    currentStep++;
    showQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  const summary = answers.map((answer, index) => `<div class="small">${index + 1}. ${answer}</div>`).join("");

  let title = "💞 Soft Heart Energy";
  let description = "She sees you as someone warm, sweet, and worth smiling about. The vibe is gentle, loving, and quietly precious.";

  const moodAnswer = answers[1] || "";
  const feelingAnswer = answers[2] || "";

  if(moodAnswer.includes("Playful") && feelingAnswer.includes("close")){
    title = "🎀 Playful Little Crush";
    description = "This one feels flirty, bubbly, and full of tiny heart sparks. She is not just happy with you — she is enjoying the feeling of being near you.";
  } else if(moodAnswer.includes("shy") && feelingAnswer.includes("safe")){
    title = "🌙 Soft and Secret Feelings";
    description = "Her heart is calm around you, but she may be hiding a lot of tenderness behind a shy smile. This is the kind of love that grows quietly.";
  } else if(feelingAnswer.includes("thinks about you")){
    title = "💫 Deep Tiny Thoughtful Love";
    description = "She is thinking about you more than she says. That means your presence is staying in her heart, and it is making her feel warm and dreamy.";
  }

  document.getElementById("resultText").innerHTML = `<h4>${title}</h4><p>${description}</p>`;
  document.getElementById("answersSummary").innerHTML = `<strong>Captured answers:</strong><br>${summary}`;
}

</script>

</body>

</body>
</html>
