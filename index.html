<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelluuuuuuu Personality Test</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ff4d6d,#7b2cbf,#00b4d8,#00f5d4);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    overflow:auto;
    position:relative;
    padding:20px;
    box-sizing:border-box;
}

.card{
    background:rgba(22,27,34,0.95);
    padding:25px;
    border-radius:22px;
    width:min(90%, 430px);
    box-shadow:0 0 35px rgba(255,255,255,0.25);
    position:relative;
    border:2px solid rgba(255,255,255,0.15);
    animation: popIn 0.6s ease;
}

.sparkle{
    position:absolute;
    width:10px;
    height:10px;
    background:#ffd166;
    border-radius:50%;
    animation: float 1.8s infinite ease-in-out;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:999px;
    background:linear-gradient(135deg,#ff5f7d,#ff8a5b);
    color:white;
    cursor:pointer;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow:0 5px 15px rgba(255,95,125,0.35);
}

button:hover{
    transform:scale(1.06);
}

.bar{
    width:100%;
    height:18px;
    background:#444;
    border-radius:10px;
    margin-top:20px;
    overflow:hidden;
    display:none;
}

.fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00ff99,#ffd166);
    transition:width 3s linear;
}

.result{
    display:none;
    font-size:18px;
    line-height:1.6;
}

.result-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin:6px 0;
    font-size:15px;
}

.fake-btns{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:12px;
    flex-wrap:wrap;
}

.fake-btns button{
    margin-top:0;
    padding:8px 12px;
    font-size:13px;
    background:#2d3748;
    color:#fff;
    box-shadow:none;
}

.emoji{font-size:1.3rem; animation:bounce 1s infinite; display:inline-block;}

.blink{animation: blink 0.8s infinite;}

.options{display:grid; gap:10px; margin-top:16px;}

.option-btn{
    width:100%;
    margin-top:0;
    padding:11px 14px;
    font-size:14px;
    border-radius:14px;
    background:linear-gradient(135deg,#ff6f91,#ff9f1c);
    box-shadow:0 4px 12px rgba(255,111,145,0.25);
}

.option-btn:hover{transform:translateY(-2px);}

.hidden{display:none;}

.small{font-size:13px; color:#ffd6e8; margin-top:10px;}

.result-box{margin-top:14px; padding:12px; border-radius:14px; background:rgba(255,255,255,0.08); text-align:left;}

@keyframes float{
    0%,100%{transform:translateY(0) scale(1);opacity:0.4;}
    50%{transform:translateY(-12px) scale(1.2);opacity:1;}
}

@keyframes bounce{
    0%,100%{transform:translateY(0);} 
    50%{transform:translateY(-6px);} 
}

@keyframes popIn{
    from{transform:scale(0.95);opacity:0.6;}
    to{transform:scale(1);opacity:1;}
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:0.3;}
}
</style>
</head>

<body>

<div class="card">
<div class="sparkle" style="top:10px; left:20px; animation-delay:0s;"></div>
<div class="sparkle" style="top:20px; right:25px; animation-delay:0.6s;"></div>
<div class="sparkle" style="bottom:20px; left:30px; animation-delay:1.1s;"></div>

<h2 id="title">💖 Gelluuuuuuu Love Mood Test <span class="emoji">✨</span></h2>

<div id="intro">
<p id="text" class="blink">
A tiny little quiz for your heart 💕<br>
She will answer 10 sweet questions about you, her mood, and what she feels about you. Then the love meter will be calculated with a cute little algorithm. 🌸💫
</p>
<button onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quiz" class="hidden">
<p id="progress" class="small">Question 1 of 10</p>
<h3 id="questionText">Question will appear here</h3>
<div id="options" class="options"></div>
</div>

<div id="result" class="hidden">
<h3>💘 Result Revealed</h3>
<div id="resultText" class="result-box"></div>
<div id="answersSummary" class="result-box"></div>
<button onclick="startQuiz()" style="margin-top:10px;">Try Again</button>
</div>

</div>

<script>

const questions = [
  {
    prompt: "What do you think about me?",
    options: [
      { text: "💗 You are sweet and caring", score: 4 },
      { text: "😄 You are funny and chaotic", score: 3 },
      { text: "🌙 You are dreamy and mysterious", score: 2 },
      { text: "✨ You are extra adorable", score: 4 }
    ]
  },
  {
    prompt: "How is her mood right now?",
    options: [
      { text: "🌸 Happy and glowing", score: 3 },
      { text: "💞 A little shy but soft", score: 4 },
      { text: "🎭 Playful and teasing", score: 3 },
      { text: "🫶 Thinking about you a lot", score: 4 }
    ]
  },
  {
    prompt: "What does she feel about you?",
    options: [
      { text: "💘 She smiles because of you", score: 4 },
      { text: "🫰 She feels safe with you", score: 5 },
      { text: "💌 She thinks about you often", score: 5 },
      { text: "🌈 She wants to be close to you", score: 5 }
    ]
  },
  {
    prompt: "When you are around, what happens?",
    options: [
      { text: "🌼 She becomes calmer", score: 4 },
      { text: "😊 She starts smiling more", score: 4 },
      { text: "💫 She gets a little nervous", score: 3 },
      { text: "🎀 She becomes extra playful", score: 3 }
    ]
  },
  {
    prompt: "How does she talk about you?",
    options: [
      { text: "With warmth", score: 4 },
      { text: "With shy giggles", score: 3 },
      { text: "With a lot of care", score: 4 },
      { text: "Like a little secret crush", score: 5 }
    ]
  },
  {
    prompt: "What kind of energy do you bring?",
    options: [
      { text: "Comfort", score: 4 },
      { text: "Sparkle", score: 4 },
      { text: "Mystery", score: 3 },
      { text: "Butterflies", score: 5 }
    ]
  },
  {
    prompt: "If she had to describe your bond, what would she say?",
    options: [
      { text: "Soft and safe", score: 4 },
      { text: "Cute and chaotic", score: 3 },
      { text: "Dreamy and deep", score: 4 },
      { text: "Very special", score: 5 }
    ]
  },
  {
    prompt: "How often does she seem to think of you?",
    options: [
      { text: "Sometimes", score: 2 },
      { text: "Often", score: 3 },
      { text: "Very often", score: 4 },
      { text: "Almost all the time", score: 5 }
    ]
  },
  {
    prompt: "What does her heart seem to say?",
    options: [
      { text: "You matter a lot", score: 4 },
      { text: "You feel special", score: 4 },
      { text: "You feel like home", score: 5 },
      { text: "You are unforgettable", score: 5 }
    ]
  },
  {
    prompt: "What should the final vibe be?",
    options: [
      { text: "Gentle affection", score: 4 },
      { text: "Flirty sweetness", score: 4 },
      { text: "Deep soft love", score: 5 },
      { text: "Tiny but powerful crush", score: 5 }
    ]
  }
];

let currentStep = 0;
let answers = [];
const storageKey = "gelluuuuu-quiz-answers";

function saveAnswers(){
  localStorage.setItem(storageKey, JSON.stringify({ answers, currentStep }));
}

function loadSavedAnswers(){
  try {
    const saved = JSON.parse(localStorage.getItem(storageKey));
    if(saved && Array.isArray(saved.answers) && saved.answers.length){
      answers = saved.answers;
      currentStep = saved.currentStep || answers.length;
      return true;
    }
  } catch (e) {
    console.log("No saved quiz data yet.");
  }
  return false;
}

function clearSavedAnswers(){
  localStorage.removeItem(storageKey);
}

function startQuiz(){
  currentStep = 0;
  answers = [];
  clearSavedAnswers();
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion(){
  const q = questions[currentStep];
  document.getElementById("questionText").textContent = q.prompt;
  document.getElementById("progress").textContent = `Question ${currentStep + 1} of ${questions.length}`;

  const optionsBox = document.getElementById("options");
  optionsBox.innerHTML = "";

  q.options.forEach((option) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = option.text;
    btn.onclick = () => selectAnswer(option);
    optionsBox.appendChild(btn);
  });
}

function selectAnswer(option){
  answers.push(option);
  saveAnswers();

  if(currentStep < questions.length - 1){
    currentStep++;
    showQuestion();
  } else {
    showResult();
  }
}

function renderChoices(){
  const summary = answers.map((item, index) => `<div class="small"><strong>${index + 1}. ${questions[index].prompt}</strong><br>↳ ${item.text}</div>`).join("");
  document.getElementById("answersSummary").innerHTML = `<strong>What she chose:</strong><br>${summary}`;
}

function calculateLoveMeter(){
  const maxScore = questions.reduce((sum, question) => sum + Math.max(...question.options.map(option => option.score)), 0);
  const currentScore = answers.reduce((sum, item) => sum + item.score, 0);
  return Math.round((currentScore / maxScore) * 100);
}

function getVerdict(score){
  if(score >= 90){
    return "🚨 This is major heart-eyes energy. The vibe is intense, sweet, and very hard to ignore.";
  }
  if(score >= 75){
    return "💖 The love meter is glowing. This feels warm, affectionate, and very real.";
  }
  if(score >= 55){
    return "✨ The vibe is soft and sweet. There is clear affection, just with a little mystery in it.";
  }
  return "🌙 The energy is gentle and cute. It feels like a shy little spark that could grow beautifully.";
}

function showResult(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  renderChoices();

  const lovePercent = calculateLoveMeter();
  const verdict = getVerdict(lovePercent);

  document.getElementById("resultText").innerHTML = `<h4>💖 Love Meter: ${lovePercent}%</h4><p>${verdict}</p>`;
}

window.addEventListener("DOMContentLoaded", () => {
  if(loadSavedAnswers()){
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
    renderChoices();

    const lovePercent = calculateLoveMeter();
    const verdict = getVerdict(lovePercent);
    document.getElementById("resultText").innerHTML = `<h4>💖 Your saved love meter</h4><p>${lovePercent}%</p><p>${verdict}</p>`;
  }
});

</script>

</body>
</html>
